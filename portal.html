<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoFrame — Client Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #111820;
            --bg-card: #151c26;
            --border: #1e2a3a;
            --text-primary: #e8edf4;
            --text-secondary: #8b9eb3;
            --text-muted: #5a6b7d;
            --accent-cyan: #00d4ff;
            --accent-orange: #ff8c42;
            --accent-green: #00c48c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* PARTICLE CANVAS */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* GRID OVERLAY */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* SCANLINE */
        .scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.15), transparent);
            z-index: 2;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        /* MAIN CONTENT */
        .portal-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
        }

        /* LOGO */
        .portal-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            mix-blend-mode: screen;
            margin-bottom: 1.5rem;
            animation: logoFade 1.5s ease-out;
        }

        @keyframes logoFade {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .portal-title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 0.25rem;
            animation: fadeUp 1s ease-out 0.3s both;
        }

        .portal-title span { color: var(--accent-cyan); }

        .portal-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 3rem;
            animation: fadeUp 1s ease-out 0.5s both;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* STATUS INDICATORS */
        .portal-status {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            animation: fadeUp 1s ease-out 0.7s both;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 196, 140, 0.4); }
            50% { opacity: 0.6; box-shadow: 0 0 8px 2px rgba(0, 196, 140, 0.2); }
        }

        .status-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* ENTER BUTTON */
        .portal-enter {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            border-radius: 4px;
            color: var(--accent-cyan);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
            animation: fadeUp 1s ease-out 0.9s both;
            overflow: hidden;
        }

        .portal-enter::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .portal-enter:hover::before {
            left: 100%;
        }

        .portal-enter:hover {
            background: rgba(0, 212, 255, 0.08);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            transform: translateY(-1px);
        }

        .portal-enter svg {
            width: 16px; height: 16px;
            transition: transform 0.3s;
        }

        .portal-enter:hover svg {
            transform: translateX(4px);
        }

        /* BACK LINK */
        .portal-back {
            margin-top: 2rem;
            animation: fadeUp 1s ease-out 1.1s both;
        }

        .portal-back a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .portal-back a:hover { color: var(--text-secondary); }

        /* CORNER BRACKETS */
        .corner {
            position: fixed;
            width: 40px; height: 40px;
            z-index: 5;
            opacity: 0.15;
        }

        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: var(--accent-cyan);
        }

        .corner-tl { top: 30px; left: 30px; }
        .corner-tl::before { top: 0; left: 0; width: 20px; height: 1px; }
        .corner-tl::after { top: 0; left: 0; width: 1px; height: 20px; }

        .corner-tr { top: 30px; right: 30px; }
        .corner-tr::before { top: 0; right: 0; width: 20px; height: 1px; }
        .corner-tr::after { top: 0; right: 0; width: 1px; height: 20px; }

        .corner-bl { bottom: 30px; left: 30px; }
        .corner-bl::before { bottom: 0; left: 0; width: 20px; height: 1px; }
        .corner-bl::after { bottom: 0; left: 0; width: 1px; height: 20px; }

        .corner-br { bottom: 30px; right: 30px; }
        .corner-br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
        .corner-br::after { bottom: 0; right: 0; width: 1px; height: 20px; }

        /* TYPING TICKER */
        .ticker {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.4;
            z-index: 10;
            white-space: nowrap;
        }

        .ticker-cursor {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* COORD DISPLAY */
        .coords {
            position: fixed;
            top: 30px;
            right: 80px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--text-muted);
            opacity: 0.3;
            z-index: 10;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .portal-title { font-size: 1.75rem; }
            .portal-status { gap: 1rem; flex-wrap: wrap; justify-content: center; }
            .corner { display: none; }
            .coords { display: none; }
        }
    </style>
</head>
<body>

    <!-- PARTICLE NETWORK -->
    <canvas id="particles"></canvas>

    <!-- GRID OVERLAY -->
    <div class="grid-overlay"></div>

    <!-- SCANLINE -->
    <div class="scanline"></div>

    <!-- CORNER BRACKETS -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- CURSOR COORDS -->
    <div class="coords" id="coords">51.8969° N, 8.4863° W</div>

    <!-- MAIN -->
    <div class="portal-content">
        <img src="images/echoframe-logo.png" alt="EchoFrame" class="portal-logo">
        <h1 class="portal-title">Echo<span>Frame</span></h1>
        <p class="portal-subtitle">Operational Intelligence Platform</p>

        <div class="portal-status">
            <div class="status-item">
                <div class="status-dot"></div>
                <span class="status-text">Systems Online</span>
            </div>
            <div class="status-item">
                <div class="status-dot"></div>
                <span class="status-text">5 Platforms Active</span>
            </div>
            <div class="status-item">
                <div class="status-dot"></div>
                <span class="status-text">103+ Sources</span>
            </div>
        </div>

        <a href="login.html" class="portal-enter">
            Enter Client Portal
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>

        <div class="portal-back">
            <a href="index.html">&larr; echoframe.co</a>
        </div>
    </div>

    <!-- TICKER -->
    <div class="ticker" id="ticker"></div>

    <script>
        // PARTICLE NETWORK
        (function() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let w, h, particles, mouse;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }

            mouse = { x: w / 2, y: h / 2 };

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.r = Math.random() * 1.5 + 0.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > w) this.vx *= -1;
                    if (this.y < 0 || this.y > h) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 212, 255, 0.25)';
                    ctx.fill();
                }
            }

            function init() {
                resize();
                const count = Math.min(80, Math.floor((w * h) / 15000));
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle());
                }
            }

            function connect() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(0, 212, 255, ' + (0.06 * (1 - dist / 150)) + ')';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                    // Connect to mouse
                    const mdx = particles[i].x - mouse.x;
                    const mdy = particles[i].y - mouse.y;
                    const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (mdist < 200) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.strokeStyle = 'rgba(0, 212, 255, ' + (0.12 * (1 - mdist / 200)) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                connect();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => { resize(); });
            window.addEventListener('mousemove', e => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            init();
            animate();
        })();

        // COORDINATE TRACKER
        document.addEventListener('mousemove', function(e) {
            const lat = (51.8969 + (e.clientY / window.innerHeight - 0.5) * 0.01).toFixed(4);
            const lon = (8.4863 + (e.clientX / window.innerWidth - 0.5) * 0.01).toFixed(4);
            document.getElementById('coords').textContent = lat + '\u00B0 N, ' + lon + '\u00B0 W';
        });

        // TYPING TICKER
        (function() {
            const messages = [
                'SCANNING 103+ OSINT FEEDS...',
                'BAYESIAN ENGINE: CALIBRATING LIKELIHOOD RATIOS...',
                'ADS-B TELEMETRY: 2,847 TRACKED FLIGHTS...',
                'AIS MARITIME: MONITORING STRAIT OF HORMUZ...',
                'MONTE CARLO: RUNNING 10,000 SCENARIO ITERATIONS...',
                'SOURCE TIER-1: 47 FEEDS ACTIVE...',
                'GDELT EVENT STREAM: PROCESSING...',
                'NASA FIRMS: FIRE DETECTION — 0 ANOMALIES...',
                'ACTOR NETWORK: 214 ENTITIES TRACKED...',
                'CONFIDENCE BANDS: RECALCULATING...',
                'BRIER SCORE: 0.18 — WELL CALIBRATED...',
            ];

            const ticker = document.getElementById('ticker');
            let msgIndex = 0;
            let charIndex = 0;
            let deleting = false;

            function type() {
                const msg = messages[msgIndex];
                if (!deleting) {
                    ticker.innerHTML = msg.substring(0, charIndex) + '<span class="ticker-cursor">|</span>';
                    charIndex++;
                    if (charIndex > msg.length) {
                        deleting = true;
                        setTimeout(type, 2000);
                        return;
                    }
                    setTimeout(type, 30 + Math.random() * 40);
                } else {
                    charIndex--;
                    ticker.innerHTML = msg.substring(0, charIndex) + '<span class="ticker-cursor">|</span>';
                    if (charIndex === 0) {
                        deleting = false;
                        msgIndex = (msgIndex + 1) % messages.length;
                        setTimeout(type, 500);
                        return;
                    }
                    setTimeout(type, 15);
                }
            }

            setTimeout(type, 1500);
        })();
    </script>
</body>
</html>
