<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoFrame | Operational Political Risk Intelligence</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.08);
            --green: #00c48c;
            --orange: #ff8c42;
            --text: #e8edf4;
            --text-dim: #5a6b7d;
            --border: #1a2535;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            cursor: crosshair;
        }

        /* GLOBE CANVAS */
        #globe {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* VIGNETTE */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%);
            pointer-events: none;
        }

        /* HUD ELEMENTS */
        .hud-top {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            pointer-events: none;
        }

        .hud-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            opacity: 0;
            animation: hudIn 1s ease-out 1.5s forwards;
        }

        .hud-top-right {
            text-align: right;
        }

        @keyframes hudIn {
            to { opacity: 0.5; }
        }

        /* CORNER FRAMES */
        .frame { position: fixed; z-index: 15; opacity: 0; animation: frameIn 0.8s ease-out forwards; }
        .frame-tl { top: 20px; left: 20px; animation-delay: 0.8s; }
        .frame-tr { top: 20px; right: 20px; animation-delay: 0.9s; }
        .frame-bl { bottom: 20px; left: 20px; animation-delay: 1.0s; }
        .frame-br { bottom: 20px; right: 20px; animation-delay: 1.1s; }

        @keyframes frameIn { to { opacity: 0.2; } }

        .frame svg { width: 50px; height: 50px; }
        .frame svg line { stroke: var(--cyan); stroke-width: 1; }

        /* CENTER CONTENT */
        .portal-center {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
        }

        /* LOGO REVEAL */
        .logo-container {
            position: relative;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: logoReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            top: -15px; left: -15px;
            right: -15px; bottom: -15px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            animation: logoPulse 3s ease-in-out infinite;
        }

        .logo-container::after {
            content: '';
            position: absolute;
            top: -30px; left: -30px;
            right: -30px; bottom: -30px;
            border: 1px solid rgba(0, 212, 255, 0.04);
            border-radius: 50%;
            animation: logoPulse 3s ease-in-out 0.5s infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }

        @keyframes logoReveal {
            0% { opacity: 0; transform: scale(0.5) rotateY(90deg); }
            60% { transform: scale(1.05) rotateY(-5deg); }
            100% { opacity: 1; transform: scale(1) rotateY(0deg); }
        }

        .portal-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.2));
        }

        /* TITLE */
        .title-group {
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .title-line {
            overflow: hidden;
        }

        .title-text {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.05;
            transform: translateY(100%);
            animation: titleSlide 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .title-text:nth-child(1) .inner { animation-delay: 0.4s; }
        .title-text .inner {
            display: inline-block;
            transform: translateY(100%);
            animation: titleSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        @keyframes titleSlide {
            to { transform: translateY(0); }
        }

        .title-text span { color: var(--cyan); }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* LIVE FEEDS */
        .feeds {
            display: flex;
            gap: 3rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: feedsIn 1s ease-out 1.2s forwards;
        }

        @keyframes feedsIn {
            to { opacity: 1; }
        }

        .feed {
            text-align: center;
        }

        .feed-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyan);
            line-height: 1;
        }

        .feed-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-top: 0.35rem;
        }

        .feed-bar {
            width: 100%;
            height: 2px;
            background: var(--border);
            margin-top: 0.5rem;
            border-radius: 1px;
            overflow: hidden;
        }

        .feed-bar-fill {
            height: 100%;
            background: var(--cyan);
            border-radius: 1px;
            animation: barPulse 3s ease-in-out infinite;
        }

        @keyframes barPulse {
            0%, 100% { width: 60%; opacity: 0.5; }
            50% { width: 90%; opacity: 1; }
        }

        /* PLATFORM INDICATORS */
        .platforms-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .plat-indicator {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.7rem;
            background: rgba(0, 212, 255, 0.04);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 3px;
            transition: all 0.3s;
        }

        .plat-indicator:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.25);
        }

        .plat-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(0, 196, 140, 0.5);
            animation: dotPulse 2s ease-in-out infinite;
        }

        .plat-indicator:nth-child(2) .plat-dot { animation-delay: 0.3s; }
        .plat-indicator:nth-child(3) .plat-dot { animation-delay: 0.6s; }
        .plat-indicator:nth-child(4) .plat-dot { animation-delay: 0.9s; }
        .plat-indicator:nth-child(5) .plat-dot { animation-delay: 1.2s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .plat-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        /* ENTER BUTTON */
        .enter-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 3rem;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            animation: btnIn 1s ease-out 1.8s forwards;
            transition: all 0.4s;
        }

        @keyframes btnIn {
            to { opacity: 1; }
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.06) 25%, rgba(0,212,255,0.12) 50%, rgba(0,212,255,0.06) 75%, transparent 100%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -200%; }
            100% { left: 200%; }
        }

        .enter-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15), inset 0 0 40px rgba(0, 212, 255, 0.05);
            transform: scale(1.02);
            border-color: rgba(0, 212, 255, 0.8);
        }

        .enter-btn svg {
            width: 18px; height: 18px;
            transition: transform 0.3s;
        }

        .enter-btn:hover svg {
            transform: translateX(5px);
        }

        /* BACK LINK */
        .back-link {
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        .back-link a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            transition: color 0.2s;
        }

        .back-link a:hover { color: var(--text); }


        /* SCAN LINE */
        .scan {
            position: fixed;
            top: -2px; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.2) 20%, rgba(0,212,255,0.4) 50%, rgba(0,212,255,0.2) 80%, transparent 100%);
            z-index: 25;
            animation: scanMove 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .title-text { font-size: 2.2rem; }
            .feeds { gap: 1.5rem; }
            .feed-value { font-size: 1.1rem; }
            .platforms-row { flex-wrap: wrap; justify-content: center; }
            .frame { display: none; }
            .portal-logo { width: 90px; height: 90px; }
        }

        @media (max-width: 480px) {
            .title-text { font-size: 1.75rem; }
            .feeds { flex-direction: column; gap: 1rem; align-items: center; }
            .subtitle { letter-spacing: 0.15em; font-size: 0.6rem; }
        }
    </style>
</head>

    <script>
    // ==========================================
    // 3D WIREFRAME GLOBE
    // ==========================================
    (function() {
        const canvas = document.getElementById('globe');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy, R;
        let rotY = 0, rotX = 0.3;
        let mouseX = 0, mouseY = 0;
        let targetRotY = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            R = Math.min(W, H) * 0.32;
        }

        resize();
        window.addEventListener('resize', resize);

        // City coordinates [lat, lon, name]
        const cities = [
            [51.90, -8.49, 'Cork'],
            [46.20, 6.14, 'Geneva'],
            [24.45, 54.65, 'Abu Dhabi'],
            [51.51, -0.13, 'London'],
            [55.60, 13.00, 'Malmö'],
            [25.54, -103.41, 'Torreón'],
            [25.67, -100.31, 'Monterrey'],
            [35.69, 51.39, 'Tehran'],
            [10.49, -66.88, 'Caracas'],
            [50.85, 4.35, 'Brussels'],
            [19.43, -99.13, 'Mexico City'],
        ];

        function project(lat, lon) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;

            let x = R * Math.sin(phi) * Math.cos(theta);
            let y = R * Math.cos(phi);
            let z = R * Math.sin(phi) * Math.sin(theta);

            // Rotate Y
            const cosRY = Math.cos(rotY), sinRY = Math.sin(rotY);
            const x1 = x * cosRY - z * sinRY;
            const z1 = x * sinRY + z * cosRY;

            // Rotate X
            const cosRX = Math.cos(rotX), sinRX = Math.sin(rotX);
            const y1 = y * cosRX - z1 * sinRX;
            const z2 = y * sinRX + z1 * cosRX;

            return { x: cx + x1, y: cy + y1, z: z2, visible: z2 > -R * 0.1 };
        }

        function drawGlobe() {
            ctx.clearRect(0, 0, W, H);

            // Latitude lines
            for (let lat = -80; lat <= 80; lat += 20) {
                ctx.beginPath();
                let first = true;
                for (let lon = 0; lon <= 360; lon += 3) {
                    const p = project(lat, lon);
                    if (p.visible) {
                        if (first) { ctx.moveTo(p.x, p.y); first = false; }
                        else ctx.lineTo(p.x, p.y);
                    } else { first = true; }
                }
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.06)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // Longitude lines
            for (let lon = 0; lon < 360; lon += 20) {
                ctx.beginPath();
                let first = true;
                for (let lat = -90; lat <= 90; lat += 3) {
                    const p = project(lat, lon);
                    if (p.visible) {
                        if (first) { ctx.moveTo(p.x, p.y); first = false; }
                        else ctx.lineTo(p.x, p.y);
                    } else { first = true; }
                }
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.06)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // Equator (brighter)
            ctx.beginPath();
            let first = true;
            for (let lon = 0; lon <= 360; lon += 2) {
                const p = project(0, lon);
                if (p.visible) {
                    if (first) { ctx.moveTo(p.x, p.y); first = false; }
                    else ctx.lineTo(p.x, p.y);
                } else { first = true; }
            }
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.12)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // Cities
            cities.forEach(function(city, i) {
                const p = project(city[0], city[1]);
                if (!p.visible) return;

                const brightness = 0.3 + 0.7 * ((p.z + R) / (2 * R));

                // Glow
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 212, 255, ' + (0.05 * brightness) + ')';
                ctx.fill();

                // Dot
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = i < 7
                    ? 'rgba(0, 196, 140, ' + brightness + ')'
                    : 'rgba(0, 212, 255, ' + (brightness * 0.7) + ')';
                ctx.fill();

                // Ping animation (EchoFrame cities only)
                if (i < 7) {
                    const pingPhase = (Date.now() / 1000 + i * 0.7) % 3;
                    if (pingPhase < 1.5) {
                        const pingR = pingPhase * 12;
                        const pingAlpha = (1 - pingPhase / 1.5) * 0.15 * brightness;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, pingR, 0, Math.PI * 2);
                        ctx.strokeStyle = 'rgba(0, 196, 140, ' + pingAlpha + ')';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }

            });

            // Connection lines between EchoFrame cities
            for (let i = 0; i < 7; i++) {
                for (let j = i + 1; j < 7; j++) {
                    const p1 = project(cities[i][0], cities[i][1]);
                    const p2 = project(cities[j][0], cities[j][1]);
                    if (p1.visible && p2.visible) {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < R * 1.2) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = 'rgba(0, 212, 255, 0.03)';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            // Outer ring
            ctx.beginPath();
            ctx.arc(cx, cy, R + 15, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.04)';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            // Tick marks
            for (let i = 0; i < 72; i++) {
                const angle = (i / 72) * Math.PI * 2;
                const innerR = R + 15;
                const outerR = i % 9 === 0 ? R + 25 : R + 19;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
                ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
                ctx.strokeStyle = 'rgba(0, 212, 255, ' + (i % 9 === 0 ? '0.1' : '0.04') + ')';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }

        // Mouse interaction
        document.addEventListener('mousemove', function(e) {
            mouseX = (e.clientX / W - 0.5) * 2;
            mouseY = (e.clientY / H - 0.5) * 2;
            targetRotY = mouseX * 0.5;
        });

        function animate() {
            rotY += (targetRotY - rotY) * 0.02;
            rotY += 0.001; // Slow auto-rotation
            drawGlobe();
            requestAnimationFrame(animate);
        }

        animate();
    })();

    // ==========================================
    // COUNTER ANIMATION
    // ==========================================
    (function() {
        function animateCounter(el, target, duration) {
            const start = 0;
            const startTime = performance.now();
            function step(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(start + (target - start) * eased);
                el.textContent = current;
                if (progress < 1) requestAnimationFrame(step);
            }
            setTimeout(function() { requestAnimationFrame(step); }, 1200);
        }
        animateCounter(document.getElementById('feedSources'), 103, 2000);
