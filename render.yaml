services:
  - type: web
    name: echoframe-website
    env: static
    staticPublishPath: .
    headers:
      - path: "/*.html"
        name: Cache-Control
        value: no-cache, must-revalidate
      - path: /images/*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
