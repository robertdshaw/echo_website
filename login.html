<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EchoFrame</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #111820;
            --bg-card: #151c26;
            --border: #1e2a3a;
            --text-primary: #e8edf4;
            --text-secondary: #8b9eb3;
            --text-muted: #5a6b7d;
            --accent-cyan: #00d4ff;
            --accent-red: #ff5a5a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            mix-blend-mode: screen;
            margin-bottom: 1rem;
        }

        .login-brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .login-brand h1 span {
            color: var(--accent-cyan);
        }

        .login-brand p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.35rem;
        }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-cyan);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .submit-button {
            width: 100%;
            padding: 0.7rem;
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-button:hover {
            opacity: 0.85;
        }

        .error-message {
            color: var(--accent-red);
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <img src="images/echoframe-logo.png" alt="EchoFrame" class="login-logo">
            <h1>Echo<span>Frame</span></h1>
            <p>Client Portal</p>
        </div>
        <div class="login-box">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="submit-button">Sign In</button>
                <div id="errorMessage" class="error-message">Invalid username or password</div>
            </form>
        </div>
        <div class="back-link">
            <a href="/">&larr; Back to echoframe.co</a>
        </div>
    </div>

    <script>
        const storage = {
            memoryStorage: {},
            isLocalStorageAvailable() {
                try { const t = '__t__'; localStorage.setItem(t, t); localStorage.removeItem(t); return true; }
                catch(e) { return false; }
            },
            isSessionStorageAvailable() {
                try { const t = '__t__'; sessionStorage.setItem(t, t); sessionStorage.removeItem(t); return true; }
                catch(e) { return false; }
            },
            getItem(k) {
                if (this.isLocalStorageAvailable()) return localStorage.getItem(k);
                if (this.isSessionStorageAvailable()) return sessionStorage.getItem(k);
                return this.memoryStorage[k] || null;
            },
            setItem(k, v) {
                if (this.isLocalStorageAvailable()) localStorage.setItem(k, v);
                else if (this.isSessionStorageAvailable()) sessionStorage.setItem(k, v);
                else this.memoryStorage[k] = v;
            },
            removeItem(k) {
                if (this.isLocalStorageAvailable()) localStorage.removeItem(k);
                else if (this.isSessionStorageAvailable()) sessionStorage.removeItem(k);
                else delete this.memoryStorage[k];
            }
        };

        const AUTH_CONFIG = {
            validCredentials: [
                { username: 'admin', password: 'admin2024', role: 'admin', allowedPages: ['site.html', 'admin.html', 'gmtl-data-collection.html', 'latinnews-data-collection.html'], redirectTo: 'site.html' }
            ]
        };

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            const user = AUTH_CONFIG.validCredentials.find(
                cred => cred.username === username && cred.password === password
            );

            if (user) {
                const sessionData = {
                    username: user.username,
                    role: user.role,
                    allowedPages: user.allowedPages,
                    loginTime: new Date().toISOString(),
                    token: 'authenticated'
                };

                if (!storage.isLocalStorageAvailable() && !storage.isSessionStorageAvailable()) {
                    const authToken = btoa(JSON.stringify(sessionData));
                    window.location.href = user.redirectTo + '?auth=' + encodeURIComponent(authToken);
                } else {
                    storage.setItem('echoframe_session', JSON.stringify(sessionData));
                    window.location.href = user.redirectTo;
                }
            } else {
                errorMessage.style.display = 'block';
            }
        }

        window.addEventListener('load', function() {
            const session = storage.getItem('echoframe_session');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.token === 'authenticated') {
                        const userConfig = AUTH_CONFIG.validCredentials.find(c => c.username === data.username);
                        if (userConfig) window.location.href = userConfig.redirectTo;
                    }
                } catch(e) { storage.removeItem('echoframe_session'); }
            }
        });
    </script>
</body>
</html>
